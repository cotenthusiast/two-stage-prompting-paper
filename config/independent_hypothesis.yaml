# Ablation run: independent_hypothesis condition only
#
# Identical to default.yaml except methods: [independent_hypothesis] for all jobs.
# Four independent API calls per question (one per option, each evaluated as
# an isolated hypothesis); final prediction is the argmax of the four
# confidence scores, with ties broken by a seeded RNG.
#
# max_tokens: 4000 (bumped from 500 after the first overnight run, 20260623_194126).
# Gemini 2.5 Flash's internal "thinking" tokens draw from the same
# max_output_tokens budget as the visible response — the GeminiClient never
# sets a thinking_config/thinking_budget, so at 500 tokens it was burning the
# whole budget on hidden reasoning and getting cut off (finish_reason
# MAX_TOKENS on 976/1000 rows) before ever emitting the <score> tag, which
# tanked its accuracy to random-guess level. max_tokens is shared across all
# jobs in this config (no per-model override), so this also gives the other
# 3 models more headroom, though they weren't hitting the cap before.
#
# Run with:
#   python scripts/run_experiment.py --config config/independent_hypothesis.yaml

models:
  gpt-4.1-mini:
    provider: openai
    concurrency: 10
    min_delay_seconds: 0.0
    max_retries: 3
    timeout: 30
    pricing:
      input_per_1m: 0.40
      output_per_1m: 1.60

  gemini-2.5-flash:
    provider: gemini
    concurrency: 1
    min_delay_seconds: 1.5
    max_retries: 5
    timeout: 30
    pricing:
      input_per_1m: 0.15
      output_per_1m: 0.60

  llama-3.1-8b-instant:
    provider: groq
    concurrency: 2
    min_delay_seconds: 0.5
    max_retries: 3
    timeout: 30
    pricing:
      input_per_1m: 0.0
      output_per_1m: 0.0

  Qwen/Qwen2.5-7B-Instruct-Turbo:
    provider: together
    concurrency: 5
    min_delay_seconds: 0.2
    max_retries: 3
    timeout: 60
    pricing:
      input_per_1m: 0.20
      output_per_1m: 0.20

run:
  temperature: 0.0
  max_tokens: 4000
  seed: 42
  prompt_version: "v1"

  checkpoint_every_n: 50
  cache_enabled: true

  pride_calibration_n: 50
  pride_calibration_seed: 42

  fallback_on_parse_failure: false

  jobs:
    - model: gpt-4.1-mini
      methods: [independent_hypothesis]
      benchmark: mmlu
      split: robustness
    - model: gemini-2.5-flash
      methods: [independent_hypothesis]
      benchmark: mmlu
      split: robustness
    - model: llama-3.1-8b-instant
      methods: [independent_hypothesis]
      benchmark: mmlu
      split: robustness
    - model: Qwen/Qwen2.5-7B-Instruct-Turbo
      methods: [independent_hypothesis]
      benchmark: mmlu
      split: robustness
    - model: gpt-4.1-mini
      methods: [independent_hypothesis]
      benchmark: arc_challenge
      split: robustness
    - model: gemini-2.5-flash
      methods: [independent_hypothesis]
      benchmark: arc_challenge
      split: robustness
    - model: llama-3.1-8b-instant
      methods: [independent_hypothesis]
      benchmark: arc_challenge
      split: robustness
    - model: Qwen/Qwen2.5-7B-Instruct-Turbo
      methods: [independent_hypothesis]
      benchmark: arc_challenge
      split: robustness

paths:
  runs_dir: runs
  checkpoints_dir: checkpoints
  cache_dir: .cache/responses
  reports_dir: reports
  data_processed_dir: data/processed
  data_splits_dir: data/splits
  prompts_dir: prompts
